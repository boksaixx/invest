# 자동 수집 에이전트
# - 한국 장중(평일 09:00~15:30 KST) 15분 간격으로 시세/뉴스 수집·분석 후 저장소에 저장
# - 개장 전 브리핑(08:30 KST), 장 마감 요약(16:10 KST)
# - 밤 11시~아침 7시(KST)는 호출 없음, 주말은 일요일 저녁 1회만 (API 비용을 월 $10 이내로 유지하기 위함)
# - 자동수집 요약은 저렴한 모델(claude-haiku-4-5, lib/claude.ts의 SUMMARY_MODEL)을 사용
# - 수동 실행: Actions 탭 → "Trading Agent" → Run workflow 버튼
name: Trading Agent

on:
  schedule:
    - cron: "*/15 0-5 * * 1-5"   # KST 09:00~14:45 장중 15분 간격 (UTC 기준)
    - cron: "0,15,30 6 * * 1-5"  # KST 15:00~15:30 장 마감 직전 15분 간격
    - cron: "30 23 * * 0-4"      # KST 08:30 개장 전 브리핑
    - cron: "10 7 * * 1-5"       # KST 16:10 장 마감 요약
    - cron: "0 11 * * 0"         # KST(일) 20:00 주말 1회 점검 (+ 주간 백테스트 갱신)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trading-agent
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 3개년 과거 데이터 백필 (최초 1회 자동 + 매주 일요일 점검)
        if: ${{ hashFiles('data/market-history.json') == '' || github.event.schedule == '0 11 * * 0' }}
        run: npm run backfill

      - name: 백테스트 통계 갱신 (최초 1회 자동 + 매주 일요일)
        if: ${{ hashFiles('data/backtest.json') == '' || github.event.schedule == '0 11 * * 0' }}
        run: npm run backtest

      - name: 시세·뉴스 수집 및 AI 분석
        run: npm run collect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - name: 데이터 커밋
        run: |
          git config user.name "trading-agent[bot]"
          git config user.email "trading-agent@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: 자동 수집 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
